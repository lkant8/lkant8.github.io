name: Deploy MkDocs Site

on:
  push:
    branches:
      - main   # make sure your branch is main

# Allow the workflow to push the built site to the gh-pages branch
permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout your repo (needs full history so gh-deploy can push gh-pages)
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2️⃣ Setup Python
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.x

      # 3️⃣ Install dependencies (IMPORTANT 🔥)
      - name: Install dependencies
        run: |
          pip install mkdocs-material
          pip install mkdocs-blog-plugin

      # 4️⃣ Build and Deploy to gh-pages using the GitHub token
      - name: Deploy site
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: mkdocs gh-deploy --force
